workflows:
  customer-android:
    name: MobiGas Customer Android
    max_build_duration: 60
    environment:
      flutter: stable
      groups:
        - firebase_credentials
      vars:
        PACKAGE_NAME: "com.mobigas.mobigas"
    scripts:
      - name: Set up keystore
        script: |
          echo $CM_KEYSTORE | base64 --decode > android/app/mobigas-release-key.jks
      - name: Set up Firebase config
        script: |
          echo $GOOGLE_SERVICES_JSON | base64 --decode > android/app/google-services.json
      - name: Get Flutter packages
        script: flutter packages pub get
      - name: Build customer APK
        script: |
          flutter build apk --release \
            --flavor customer \
            --android-skip-build-dependency-validation \
            --target lib/main_customer.dart \
            --obfuscate \
            --split-debug-info=build/debug-info
      - name: Build customer AAB
        script: |
          flutter build appbundle --release \
            --flavor customer \
            --android-skip-build-dependency-validation \
            --target lib/main_customer.dart \
            --obfuscate \
            --split-debug-info=build/debug-info
    artifacts:
      - build/**/outputs/**/*.apk
      - build/**/outputs/**/*.aab
      - build/debug-info/**
  vendor-android:
    name: MobiGas Vendor Android
    max_build_duration: 60
    environment:
      flutter: stable
      groups:
        - firebase_credentials
      vars:
        PACKAGE_NAME: "com.mobigas.vendor"
    scripts:
